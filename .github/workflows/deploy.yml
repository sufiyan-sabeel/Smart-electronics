name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build static site
        id: build
        run: |
          npm run build 2>&1 | tee build-log.txt
          echo "Exit code: $?"

      - name: Debug output
        if: always()
        run: |
          echo "=== Listing out/ directory ==="
          ls -la out/ 2>/dev/null || echo "out/ directory not found"
          echo "=== Listing .next/ directory ==="
          ls -la .next/ 2>/dev/null || echo ".next/ directory not found"
          echo "=== Current directory ==="
          pwd
          echo "=== Files in root ==="
          ls -la

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt

      - name: Upload .next output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: next-output
          path: |
            out/
            .next/

      - name: Setup Pages
        if: success()
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
